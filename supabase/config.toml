project_id = "chem-game"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://serphen591.github.io/chem-game/"
additional_redirect_urls = [
  "https://serphen591.github.io/chem-game/",
  "https://serphen591.github.io/chem-game/teacher/",
  "http://localhost:8080",
  "http://127.0.0.1:8080"
]
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.chem-lab-api]
verify_jwt = true
