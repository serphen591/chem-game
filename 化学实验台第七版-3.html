        duration=1600;frames=[{transform:'translate3d(0,0,20px)'},{transform:`translate3d(${dx*.48}px,${Math.min(dy*.3,-70)}px,90px) rotate(-7deg)`},{transform:`translate3d(${dx}px,${dy}px,48px) rotate(4deg)`},{transform:`translate3d(${dx-4}px,${dy+2}px,46px) rotate(-2deg)`}];
      }else if(step.action==='gas'){
        if(assembledGasFeed){duration=2500;frames=[{transform:'translate3d(0,0,20px) scale(1)'},{offset:.22,transform:'translate3d(0,-3px,25px) scale(1.02)'},{offset:.72,transform:'translate3d(0,-3px,25px) scale(1.02)'},{transform:'translate3d(0,0,20px) scale(1)'}]}else{duration=1620;frames=[{transform:'translate3d(0,0,20px)'},{transform:`translate3d(${dx*.42}px,${Math.min(dy*.34,-62)}px,78px) rotate(-6deg)`},{transform:`translate3d(${dx-8}px,${dy-8}px,48px) rotate(-13deg)`},{transform:`translate3d(${dx}px,${dy}px,38px) rotate(-8deg)`}]}
      }else if(step.action==='connect'){
        duration=1620;frames=[{transform:'translate3d(0,0,20px)'},{transform:`translate3d(${dx*.42}px,${Math.min(dy*.34,-62)}px,78px) rotate(-6deg)`},{transform:`translate3d(${dx-8}px,${dy-8}px,48px) rotate(-13deg)`},{transform:`translate3d(${dx}px,${dy}px,38px) rotate(-8deg)`}];
      }else if(step.action==='add'||step.action==='dip'){
        duration=1650;frames=[{transform:'translate3d(0,0,20px)'},{transform:`translate3d(${dx*.45}px,${Math.min(dy*.3,-82)}px,88px) rotate(4deg)`},{transform:`translate3d(${dx}px,${dy-34}px,60px) rotate(8deg)`},{transform:`translate3d(${dx}px,${dy}px,38px) rotate(7deg)`},{transform:`translate3d(${dx}px,${dy-9}px,42px) rotate(3deg)`}];
      }
      const sourceFill=clone.querySelector('.liquid-fill'),targetFill=targetEl.querySelector('.liquid-fill');
      if((step.action==='pour'||step.action==='wet')&&sourceFill&&sourceFill.animate)sourceFill.animate([{transform:'scaleY(1)'},{offset:.35,transform:'scaleY(1)'},{transform:'scaleY(.18)'}],{duration:1100,delay:560,fill:'forwards',easing:'cubic-bezier(.25,.65,.3,1)'});
      if((step.action==='pour'||step.action==='wet')&&targetFill&&targetFill.animate){const count=Number(targetEl.dataset.fillCount||0),from=benchFillLevel(step.target,count),to=benchFillLevel(step.target,count+1);targetFill.animate([{height:`${from}px`},{height:`${to}px`}],{duration:920,delay:720,fill:'forwards',easing:'cubic-bezier(.2,.7,.25,1)'});targetEl.style.setProperty('--fill-level',`${to}px`)}
      const clearGasTransfer=assembledGasFeed?createGasTransfer(bench,mouth,opening,duration):null;
      setTimeout(()=>spawnActionEffect(step,bench,opening),step.action==='pour'||step.action==='wet'?720:assembledGasFeed?900:520);
      await animateMove(clone,frames,duration);if(clearGasTransfer)clearGasTransfer();clone.remove();sourceEl.style.opacity='';targetEl.style.filter=''
    }
    function spawnActionEffect(step,bench,opening){const{x,y}=opening,action=step.action;if(action==='pour'||action==='wet'){const stream=document.createElement('i'),tone=reagentColor(step.source);stream.className='liquid-stream';stream.style.left=`${x-4}px`;stream.style.top=`${y-73}px`;stream.style.setProperty('--stream-color',tone.color);stream.style.setProperty('--stream-deep',tone.deep);bench.appendChild(stream);setTimeout(()=>stream.remove(),1120)}else if(action==='add'||action==='dip'){for(let i=0;i<9;i++){const p=document.createElement('i');p.className='solid-particle';p.style.left=`${x-24+i*5}px`;p.style.top=`${y-76-(i%3)*9}px`;p.style.animationDelay=`${i*48}ms`;bench.appendChild(p);setTimeout(()=>p.remove(),1450)}}else if(action==='gas'){for(let i=0;i<10;i++){const b=document.createElement('i');b.className='gas-bubble';b.style.left=`${x-28+(i%5)*12}px`;b.style.top=`${y+18-(i%2)*8}px`;b.style.animationDelay=`${i*60}ms`;bench.appendChild(b);setTimeout(()=>b.remove(),1550)}}else if(action==='connect'){const lock=document.createElement('i');lock.className='assembly-lock-pulse';lock.style.left=`${x}px`;lock.style.top=`${y}px`;bench.appendChild(lock);setTimeout(()=>lock.remove(),980)}else if(action==='ignite'||action==='heat'||action==='insert-lit-tube'){const fire=document.createElement('i');fire.className='flame-burst';fire.style.left=`${x}px`;fire.style.top=`${y}px`;bench.appendChild(fire);setTimeout(()=>fire.remove(),1550)}}
    function checkObservation(value){const s=labState;if(s.locked)return;if(value===currentLab.phenomenon){s.observation=value;finishEvaluatedStep('实验现象判断',()=>{s.phase='equation'})}else registerStepError('现象不对应这组反应，请回忆反应物原有颜色、气体、沉淀及先后变化。',()=>{s.observation=currentLab.phenomenon;finishEvaluatedStep('实验现象判断',()=>{s.phase='equation'})})}
    function checkLabEquation(){
      const s=labState,m=s.eqModel;if(s.locked)return;
      if(s.equationStage==='species'){
        const reactants=m.reactants.map(x=>x.formula),products=m.products.map(x=>x.formula),correct=sameMultiset(s.reactantSelection,reactants)&&sameMultiset(s.productSelection,products);
        if(correct)finishEvaluatedStep('反应物与生成物选择',()=>{s.equationStage='balance'});
        else registerStepError('反应物或生成物选择不正确；只判断所属一侧，不判断同侧顺序。',()=>{s.reactantSelection=[...reactants];s.productSelection=[...products];finishEvaluatedStep('反应物与生成物选择',()=>{s.equationStage='balance'})});
      }else{
        const correct=m.reactants.every((x,i)=>(s.coefficients['r'+i]||'1')===x.coefficient)&&m.products.every((x,i)=>(s.coefficients['p'+i]||'1')===x.coefficient);
        if(correct)finishEvaluatedStep('化学方程式配平',()=>{s.phase='complete';recordDone(currentLab.displayCode||currentLab.code)});
        else registerStepError('配平系数不正确，请重新检查各元素在反应前后的数量。',()=>{m.reactants.forEach((x,i)=>s.coefficients['r'+i]=x.coefficient);m.products.forEach((x,i)=>s.coefficients['p'+i]=x.coefficient);finishEvaluatedStep('化学方程式配平',()=>{s.phase='complete';recordDone(currentLab.displayCode||currentLab.code)})});
      }
    }
    function recordDone(code){const ratings=labState&&Array.isArray(labState.stepRatings)?labState.stepRatings:[],maxStepErrors=ratings.reduce((max,item)=>Math.max(max,Number(item.errors)||0),0),needsRedo=ratings.some(item=>Number(item.errors)>=3),status=readExperimentStatus();status[code]={completed:true,needsRedo,maxStepErrors,completedAt:new Date().toISOString()};localStorage.setItem(EXPERIMENT_STATUS_KEY,JSON.stringify(status));const done=legacyCompletedCodes();if(!done.includes(code)){done.push(code);localStorage.setItem('chemLabDone',JSON.stringify(done.slice(-30)))}}
    function renderQuickIntro(){const unlocked=Number(localStorage.getItem('chemLabQuickLevel')||1);app.innerHTML=header()+`<section class="view quick-shell"><div class="page-head"><button class="back-btn" id="quick-home">← 首页</button><div class="page-head-copy"><h1>快速闯关</h1><p>依次完成3个反应配对与现象题、2个方程式拼图、1个分段综合题。</p></div></div><div class="quick-card quick-hero"><div><span class="quick-type">六题路线</span><h1>从最简单的现象开始</h1><p>每题第一次就答对才算“完美通过”。六题全部一次正确，将开放更难题目的随机抽取。</p>${unlocked>1?'<div class="unlock">🏆 进阶题库已开放，可以直接挑战难度2。</div>':''}<div class="side-actions"><button class="primary-btn" id="start-basic">基础闯关</button>${unlocked>1?'<button class="soft-btn" id="start-advanced">进阶闯关</button>':''}</div></div><div class="scene-icon bolt" style="position:relative;right:auto;top:auto">⚡</div></div></section>`;document.getElementById('quick-home').onclick=renderHome;document.getElementById('start-basic').onclick=()=>startQuick(1);if(unlocked>1)document.getElementById('start-advanced').onclick=()=>startQuick(2)}
    function startQuick(level){const matches=shuffle(MATCH_POOL.filter(q=>q.difficulty===level)).slice(0,3).map(q=>({...q,options:shuffle(q.options),kind:'match'}));const puzzles=shuffle(PUZZLE_POOL.filter(q=>q.difficulty===level)).slice(0,2).map(q=>({...q,kind:'puzzle'}));const picked=shuffle(COMBO_POOL.filter(q=>q.difficulty===level))[0];const combo={...picked,segments:picked.segments.map(seg=>({...seg,options:shuffle(seg.options)})),kind:'combo'};quickState={level,questions:[...matches,...puzzles,combo],index:0,perfect:true,wrongOnCurrent:false,answer:[],segment:0};renderQuick()}
    function renderRoute(){return quickState.questions.map((q,i)=>`<div class="route-step ${i<quickState.index?'done':i===quickState.index?'active':''}">${i+1}·${q.kind==='match'?'现象':q.kind==='puzzle'?'拼图':'综合'}</div>`).join('')}
    function renderQuick(){const s=quickState;if(s.index>=s.questions.length){return renderQuickResult()}const q=s.questions[s.index];app.innerHTML=header()+`<section class="view quick-shell"><div class="page-head"><button class="back-btn" id="quit-quick">← 退出</button><div class="page-head-copy"><h1>快速闯关</h1><p>难度 ${s.level} · ${s.perfect?'保持完美':'继续完成本轮'}</p></div><span class="progress-chip">${s.index+1} / 6</span></div><div class="quick-card"><div class="route">${renderRoute()}</div><div class="quick-question">${quickQuestion(q)}</div><div class="feedback ${s.feedbackKind||''}" id="quick-feedback">${s.feedback||''}</div></div></section>`;document.getElementById('quit-quick').onclick=renderQuickIntro;bindQuick(q)}
    function quickQuestion(q){if(q.kind==='match')return `<span class="quick-type">反应配对与现象 · ${q.source}</span><h2>${esc(q.prompt)}</h2><p>选择唯一正确的反应现象或判断。</p><div class="quick-options">${q.options.map(o=>`<button class="quick-option" data-quick-option="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;if(q.kind==='puzzle')return `<span class="quick-type">方程式拼图 · ${q.source}</span><h2>${esc(q.prompt)}</h2><p>点击下方卡片，按正确顺序放入答案槽。</p><div class="token-bank">${shuffle(remainingParts(q.parts,quickState.answer)).map(x=>`<button class="eq-token" data-quick-token="${esc(x)}">${esc(x)}</button>`).join('')}</div><div class="answer-slots">${quickState.answer.map((x,i)=>`<button class="eq-token" data-quick-remove="${i}">${esc(x)}</button>`).join('')||'<span style="color:var(--muted)">答案槽位</span>'}</div><div class="side-actions"><button class="soft-btn" id="quick-clear">重排</button><button class="primary-btn" id="quick-check">检查</button></div>`;const seg=q.segments[quickState.segment];return `<span class="quick-type">分段综合题 · ${q.source}</span><h2>${esc(q.title)}</h2><div class="segment-row">${q.segments.map((_,i)=>`<i class="segment-dot ${i<quickState.segment?'done':i===quickState.segment?'active':''}"></i>`).join('')}</div><p>第${quickState.segment+1}段：${esc(seg.prompt)}</p><div class="quick-options">${seg.options.map(o=>`<button class="quick-option" data-combo-option="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}
    function bindQuick(q){if(q.kind==='match')document.querySelectorAll('[data-quick-option]').forEach(b=>b.onclick=()=>quickAnswer(b.dataset.quickOption===q.answer));else if(q.kind==='puzzle'){document.querySelectorAll('[data-quick-token]').forEach(b=>b.onclick=()=>{quickState.answer.push(b.dataset.quickToken);renderQuick()});document.querySelectorAll('[data-quick-remove]').forEach(b=>b.onclick=()=>{quickState.answer.splice(Number(b.dataset.quickRemove),1);renderQuick()});document.getElementById('quick-clear').onclick=()=>{quickState.answer=[];renderQuick()};document.getElementById('quick-check').onclick=()=>quickAnswer(quickState.answer.join('|')===q.parts.join('|'))}else{const seg=q.segments[quickState.segment];document.querySelectorAll('[data-combo-option]').forEach(b=>b.onclick=()=>{if(b.dataset.comboOption===seg.answer){if(quickState.segment<q.segments.length-1){quickState.segment++;quickState.feedback='本段正确，进入下一段。';quickState.feedbackKind='success';renderQuick()}else quickAnswer(true)}else quickAnswer(false,false)})}}
    function quickAnswer(correct,advance=true){const s=quickState;if(correct){s.feedback='正确！';s.feedbackKind='success';if(advance!==false){s.index++;s.answer=[];s.segment=0;s.wrongOnCurrent=false}setTimeout(renderQuick,320)}else{s.perfect=false;s.wrongOnCurrent=true;s.feedback='这次不对，重新观察题干中的现象、条件或守恒关系。';s.feedbackKind='error';if(s.questions[s.index].kind==='puzzle')s.answer=[];renderQuick()}}
    function renderQuickResult(){const s=quickState;let unlocked=false;if(s.perfect&&s.level===1&&Number(localStorage.getItem('chemLabQuickLevel')||1)<2){localStorage.setItem('chemLabQuickLevel','2');unlocked=true}app.innerHTML=header()+`<section class="view quick-shell"><div class="quick-card complete-card" style="position:relative;left:auto;top:auto;transform:none;width:auto;margin-top:7vh"><div class="rating">${s.perfect?'完美':'闯关完成'}</div><h1>六道题全部完成</h1><p>${s.perfect?'每一道题都在第一次作答时正确。':'本轮已经完成，可以重新挑战一次全对。'}</p>${unlocked?'<div class="unlock">🔓 更难题目的随机抽取已经开放！</div>':''}<div class="route">${s.questions.map((q,i)=>`<div class="route-step done">${i+1}·完成</div>`).join('')}</div><div class="side-actions"><button class="soft-btn" id="quick-again">再来一轮</button><button class="primary-btn" id="quick-finish">返回首页</button></div></div></section>`;document.getElementById('quick-again').onclick=renderQuickIntro;document.getElementById('quick-finish').onclick=renderHome}
    document.addEventListener('click',e=>{const themeToggle=e.target.closest&&e.target.closest('#theme-drawer-toggle');if(themeToggle)return openThemeDrawer();const themeClose=e.target.closest&&e.target.closest('#theme-close');if(themeClose)return closeThemeDrawer();const themeChoice=e.target.closest&&e.target.closest('[data-theme-choice]');if(themeChoice)return applyTheme(themeChoice.dataset.themeChoice,true);const toggle=e.target.closest&&e.target.closest('#bank-drawer-toggle');if(toggle)return openBankDrawer();const close=e.target.closest&&e.target.closest('#drawer-close');if(close){const drawer=document.getElementById('bank-drawer');if(drawer)drawer.classList.remove('open');const t=document.getElementById('bank-drawer-toggle');if(t)t.setAttribute('aria-expanded','false');return}const tab=e.target.closest&&e.target.closest('[data-drawer-module]');if(tab){drawerModule=tab.dataset.drawerModule;const search=document.getElementById('drawer-search');if(search)search.value='';renderDrawerList('');return}const row=e.target.closest&&e.target.closest('[data-bank-experiment]');if(row)openBankExperiment(row.dataset.bankExperiment)});
    document.addEventListener('input',e=>{if(e.target&&e.target.id==='drawer-search')renderDrawerList(e.target.value)});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeThemeDrawer();const drawer=document.getElementById('bank-drawer'),toggle=document.getElementById('bank-drawer-toggle');if(drawer)drawer.classList.remove('open');if(toggle)toggle.setAttribute('aria-expanded','false')}});
    applyTheme(activeTheme(),false);
    renderHome();
  })();
  </script>
